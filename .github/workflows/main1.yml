name: Monitor Project Start Dates

on:
  schedule:
    - cron: '0 * * * *'  # Cada hora
  workflow_dispatch:

jobs:
  monitor-start-dates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Extract and Log Start Dates
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const owner = 'jhomercontreras-maker';
            const repo = 'FdEE_Equipo_X';
            
            // Archivo de registro
            const logFile = 'start-dates-log.txt';
            const jsonFile = 'start-dates-history.json';
            
            try {
              // Obtener todas las issues
              const issues = await github.rest.issues.listForRepo({
                owner: owner,
                repo: repo,
                state: 'all',
                per_page: 100
              });
              
              const timestamp = new Date().toISOString();
              const readableTime = new Date().toLocaleString();
              
              console.log('📊 REPORTE DE FECHAS DE START');
              console.log('='.repeat(80));
              console.log(`Fecha y hora del reporte: ${readableTime}`);
              console.log(`Timestamp: ${timestamp}`);
              console.log(`Repositorio: ${owner}/${repo}`);
              console.log('='.repeat(80));
              
              // Procesar cada issue
              const startDatesData = [];
              let logContent = `\n${'='.repeat(80)}\n`;
              logContent += `REPORTE DE FECHAS DE START - ${readableTime}\n`;
              logContent += `${'='.repeat(80)}\n\n`;
              
              issues.data.forEach((issue, index) => {
                const startDate = issue.created_at; // O puedes usar updated_at
                
                console.log(`\n${index + 1}. 📌 Issue #${issue.number}: ${issue.title}`);
                console.log(`   Fecha de creación (START): ${new Date(startDate).toLocaleString()}`);
                console.log(`   Última actualización: ${new Date(issue.updated_at).toLocaleString()}`);
                console.log(`   Estado: ${issue.state}`);
                console.log(`   URL: ${issue.html_url}`);
                
                logContent += `${index + 1}. Issue #${issue.number}: ${issue.title}\n`;
                logContent += `   START DATE: ${new Date(startDate).toLocaleString()}\n`;
                logContent += `   Updated: ${new Date(issue.updated_at).toLocaleString()}\n`;
                logContent += `   State: ${issue.state}\n`;
                logContent += `   URL: ${issue.html_url}\n\n`;
                
                startDatesData.push({
                  number: issue.number,
                  title: issue.title,
                  start_date: startDate,
                  updated_date: issue.updated_at,
                  state: issue.state,
                  url: issue.html_url,
                  recorded_at: timestamp
                });
              });
              
              console.log('\n' + '='.repeat(80));
              console.log('✅ Reporte completado');
              
              // Guardar en archivo de texto (.txt)
              if (fs.existsSync(logFile)) {
                fs.appendFileSync(logFile, logContent);
              } else {
                fs.writeFileSync(logFile, logContent);
              }
              console.log(`📝 Guardado en: ${logFile}`);
              
              // Guardar en JSON para análisis
              let allHistory = [];
              if (fs.existsSync(jsonFile)) {
                try {
                  allHistory = JSON.parse(fs.readFileSync(jsonFile, 'utf8'));
                } catch (e) {
                  allHistory = [];
                }
              }
              
              allHistory.push({
                timestamp: timestamp,
                readable_time: readableTime,
                total_issues: issues.data.length,
                issues: startDatesData
              });
              
              fs.writeFileSync(jsonFile, JSON.stringify(allHistory, null, 2));
              console.log(`📊 Historial guardado en: ${jsonFile}`);
              console.log(`📌 Total de registros: ${allHistory.length}`);
              
            } catch (error) {
              console.error('❌ Error:', error.message);
              throw error;
            }
