name: Monitor Project Dates Report

on:
  schedule:
    - cron: '0 * * * *'  # Cada hora
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Generate Project Report
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const owner = 'jhomercontreras-maker';
            const repo = 'FdEE_Equipo_X';
            const projectNumber = 2;
            
            const reportFile = 'project-report.txt';
            const jsonFile = 'project-report.json';
            
            try {
              // Consulta GraphQL para obtener campos del proyecto
              const query = `
                query {
                  repository(owner: "${owner}", name: "${repo}") {
                    projectV2(number: ${projectNumber}) {
                      title
                      items(first: 100) {
                        nodes {
                          id
                          content {
                            ... on Issue {
                              number
                              title
                              state
                            }
                          }
                          fieldValues(first: 30) {
                            nodes {
                              ... on ProjectV2ItemFieldTextValue {
                                field {
                                  name
                                }
                                text
                              }
                              ... on ProjectV2ItemFieldSingleSelectValue {
                                field {
                                  name
                                }
                                name
                              }
                              ... on ProjectV2ItemFieldDateValue {
                                field {
                                  name
                                }
                                date
                              }
                              ... on ProjectV2ItemFieldNumberValue {
                                field {
                                  name
                                }
                                number
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              `;
              
              const result = await github.graphql(query);
              const project = result.repository.projectV2;
              const items = project.items.nodes;
              
              const timestamp = new Date().toISOString();
              const readableTime = new Date().toLocaleString();
              
              console.log('📊 REPORTE DEL PROYECTO');
              console.log('='.repeat(100));
              console.log(`Proyecto: ${project.title}`);
              console.log(`Fecha del reporte: ${readableTime}`);
              console.log(`Total de items: ${items.length}`);
              console.log('='.repeat(100));
              
              let reportContent = `REPORTE DEL PROYECTO: ${project.title}\n`;
              reportContent += `Generado: ${readableTime}\n`;
              reportContent += `${'='.repeat(100)}\n\n`;
              
              const reportData = [];
              
              items.forEach((item, index) => {
                if (item.content) {
                  const issueNumber = item.content.number;
                  const issueTitle = item.content.title;
                  const issueState = item.content.state;
                  
                  // Extraer valores de campos
                  let fieldValues = {};
                  item.fieldValues.nodes.forEach(field => {
                    if (field.field) {
                      const fieldName = field.field.name;
                      let fieldValue = field.text || field.name || field.date || field.number || 'Sin asignar';
                      fieldValues[fieldName] = fieldValue;
                    }
                  });
                  
                  console.log(`\n${index + 1}. 📌 ${project.title}`);
                  console.log(`   Issue #${issueNumber}: ${issueTitle}`);
                  console.log(`   Estado: ${issueState}`);
                  console.log(`   Status: ${fieldValues['Status'] || 'No asignado'}`);
                  console.log(`   Priority: ${fieldValues['Priority'] || 'No asignado'}`);
                  console.log(`   Size: ${fieldValues['Size'] || 'No asignado'}`);
                  console.log(`   Estimate: ${fieldValues['Estimate'] || 'No asignado'}`);
                  console.log(`   Start date: ${fieldValues['Start date'] || 'No asignado'}`);
                  console.log(`   Target date: ${fieldValues['Target date'] || 'No asignado'}`);
                  
                  reportContent += `${index + 1}. 📌 ${project.title}\n`;
                  reportContent += `   Issue #${issueNumber}: ${issueTitle}\n`;
                  reportContent += `   Estado: ${issueState}\n`;
                  reportContent += `   Status: ${fieldValues['Status'] || 'No asignado'}\n`;
                  reportContent += `   Priority: ${fieldValues['Priority'] || 'No asignado'}\n`;
                  reportContent += `   Size: ${fieldValues['Size'] || 'No asignado'}\n`;
                  reportContent += `   Estimate: ${fieldValues['Estimate'] || 'No asignado'}\n`;
                  reportContent += `   Start date: ${fieldValues['Start date'] || 'No asignado'}\n`;
                  reportContent += `   Target date: ${fieldValues['Target date'] || 'No asignado'}\n\n`;
                  
                  reportData.push({
                    project: project.title,
                    issue_number: issueNumber,
                    issue_title: issueTitle,
                    state: issueState,
                    status: fieldValues['Status'] || 'No asignado',
                    priority: fieldValues['Priority'] || 'No asignado',
                    size: fieldValues['Size'] || 'No asignado',
                    estimate: fieldValues['Estimate'] || 'No asignado',
                    start_date: fieldValues['Start date'] || 'No asignado',
                    target_date: fieldValues['Target date'] || 'No asignado',
                    recorded_at: timestamp
                  });
                }
              });
              
              console.log('='.repeat(100));
              console.log('✅ Reporte generado exitosamente');
              
              // Guardar en archivo de texto
              fs.writeFileSync(reportFile, reportContent);
              console.log(`📝 Guardado en: ${reportFile}`);
              
              // Guardar en JSON
              let allReports = [];
              if (fs.existsSync(jsonFile)) {
                try {
                  allReports = JSON.parse(fs.readFileSync(jsonFile, 'utf8'));
                } catch (e) {
                  allReports = [];
                }
              }
              
              allReports.push({
                timestamp: timestamp,
                readable_time: readableTime,
                project: project.title,
                total_items: items.length,
                items: reportData
              });
              
              fs.writeFileSync(jsonFile, JSON.stringify(allReports, null, 2));
              console.log(`📊 Historial guardado en: ${jsonFile}`);
              console.log(`📌 Total de reportes guardados: ${allReports.length}`);
              
            } catch (error) {
              console.error('❌ Error:', error.message);
              console.error('Detalle:', error);
              throw error;
            }
