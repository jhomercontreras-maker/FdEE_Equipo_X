name: Monitor Project Dates Report

on:
  schedule:
    - cron: '0 * * * *'  # Cada hora
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Generate Project Report
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const owner = 'jhomercontreras-maker';
            const repo = 'FdEE_Equipo_X';
            
            const reportFile = 'project-report.txt';
            const jsonFile = 'project-report.json';
            
            try {
              // Consulta GraphQL CORRECTA para ProjectV2
              const query = `
                query {
                  repository(owner: "${owner}", name: "${repo}") {
                    projectsV2(first: 10) {
                      nodes {
                        id
                        title
                        items(first: 100) {
                          nodes {
                            id
                            content {
                              ... on Issue {
                                number
                                title
                                state
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              `;
              
              const result = await github.graphql(query);
              const projects = result.repository.projectsV2.nodes;
              
              const timestamp = new Date().toISOString();
              const readableTime = new Date().toLocaleString();
              
              console.log('📊 REPORTE DEL PROYECTO');
              console.log('='.repeat(100));
              console.log(`Fecha del reporte: ${readableTime}`);
              console.log('='.repeat(100));
              
              let reportContent = `REPORTE DEL PROYECTO\n`;
              reportContent += `Generado: ${readableTime}\n`;
              reportContent += `${'='.repeat(100)}\n\n`;
              
              const reportData = [];
              
              projects.forEach(project => {
                console.log(`\n📌 Proyecto: ${project.title}`);
                console.log(`   Total de items: ${project.items.nodes.length}`);
                
                reportContent += `PROYECTO: ${project.title}\n`;
                reportContent += `Total de items: ${project.items.nodes.length}\n`;
                reportContent += `${'='.repeat(100)}\n\n`;
                
                project.items.nodes.forEach((item, index) => {
                  if (item.content) {
                    const issueNumber = item.content.number;
                    const issueTitle = item.content.title;
                    const issueState = item.content.state;
                    
                    console.log(`\n   ${index + 1}. Issue #${issueNumber}: ${issueTitle}`);
                    console.log(`      Estado: ${issueState}`);
                    
                    reportContent += `${index + 1}. Issue #${issueNumber}: ${issueTitle}\n`;
                    reportContent += `   Estado: ${issueState}\n\n`;
                    
                    reportData.push({
                      project: project.title,
                      issue_number: issueNumber,
                      issue_title: issueTitle,
                      state: issueState,
                      recorded_at: timestamp
                    });
                  }
                });
              });
              
              console.log('\n' + '='.repeat(100));
              console.log('✅ Reporte generado');
              
              // Guardar en archivo de texto
              fs.writeFileSync(reportFile, reportContent);
              console.log(`📝 Guardado en: ${reportFile}`);
              
              // Guardar en JSON
              let allReports = [];
              if (fs.existsSync(jsonFile)) {
                try {
                  allReports = JSON.parse(fs.readFileSync(jsonFile, 'utf8'));
                } catch (e) {
                  allReports = [];
                }
              }
              
              allReports.push({
                timestamp: timestamp,
                readable_time: readableTime,
                data: reportData
              });
              
              fs.writeFileSync(jsonFile, JSON.stringify(allReports, null, 2));
              console.log(`📊 Total de reportes: ${allReports.length}`);
              
            } catch (error) {
              console.error('❌ Error:', error.message);
              throw error;
            }
