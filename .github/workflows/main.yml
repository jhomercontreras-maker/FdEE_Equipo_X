name: Track Project Changes

on:
  schedule:
    - cron: '0 * * * *'  # Cada hora
  workflow_dispatch:

jobs:
  track-changes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Track Project Changes
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const owner = 'jhomercontreras-maker';
            const repo = 'FdEE_Equipo_X';
            
            try {
              console.log('🔍 Analizando cambios en el proyecto...\n');
              
              // Obtener todas las issues con toda la información
              const issues = await github.rest.issues.listForRepo({
                owner: owner,
                repo: repo,
                state: 'all',
                per_page: 100
              });
              
              // Obtener el historial de eventos de cada issue
              let allChanges = [];
              
              for (const issue of issues.data) {
                console.log(`📌 Procesando issue #${issue.number}...`);
                
                // Obtener eventos de la issue
                const events = await github.rest.issues.listEvents({
                  owner: owner,
                  repo: repo,
                  issue_number: issue.number,
                  per_page: 100
                });
                
                // Procesar cada evento
                events.data.forEach(event => {
                  allChanges.push({
                    issue_number: issue.number,
                    issue_title: issue.title,
                    event_type: event.event,
                    actor: event.actor?.login || 'Unknown',
                    created_at: event.created_at,
                    readable_date: new Date(event.created_at).toLocaleString('es-ES'),
                    details: {
                      action: event.event,
                      label: event.label?.name || null,
                      milestone: event.milestone?.title || null,
                      assignee: event.assignee?.login || null,
                      review_state: event.state || null
                    }
                  });
                });
              }
              
              // Ordenar por fecha (más recientes primero)
              allChanges.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
              
              const timestamp = new Date().toISOString();
              const readableTime = new Date().toLocaleString('es-ES');
              
              // Generar reporte formateado
              let reportContent = '';
              reportContent += '╔════════════════════════════════════════════════════════════════════╗\n';
              reportContent += '║           HISTORIAL DE CAMBIOS DEL PROYECTO                       ║\n';
              reportContent += '╚════════════════════════════════════════════════════════════════════╝\n\n';
              reportContent += `📅 Fecha del reporte: ${readableTime}\n`;
              reportContent += `📊 Total de cambios: ${allChanges.length}\n`;
              reportContent += `🔗 Repositorio: ${owner}/${repo}\n\n`;
              reportContent += '═'.repeat(70) + '\n\n';
              
              console.log(`\n✅ Total de cambios encontrados: ${allChanges.length}\n`);
              
              if (allChanges.length === 0) {
                reportContent += '⚠️ No hay cambios registrados en este proyecto.\n';
              } else {
                allChanges.forEach((change, index) => {
                  let changeDescription = '';
                  
                  // Describir el tipo de cambio
                  switch(change.event_type) {
                    case 'opened':
                      changeDescription = '✅ Issue ABIERTA';
                      break;
                    case 'closed':
                      changeDescription = '❌ Issue CERRADA';
                      break;
                    case 'reopened':
                      changeDescription = '🔄 Issue REABIERTA';
                      break;
                    case 'labeled':
                      changeDescription = `🏷️  Label AÑADIDO: ${change.details.label}`;
                      break;
                    case 'unlabeled':
                      changeDescription = `🏷️  Label ELIMINADO: ${change.details.label}`;
                      break;
                    case 'assigned':
                      changeDescription = `👤 ASIGNADO A: ${change.details.assignee}`;
                      break;
                    case 'unassigned':
                      changeDescription = `👤 DESASIGNADO`;
                      break;
                    case 'milestoned':
                      changeDescription = `🎯 Milestone ASIGNADO: ${change.details.milestone}`;
                      break;
                    case 'demilestoned':
                      changeDescription = `🎯 Milestone REMOVIDO`;
                      break;
                    case 'commented':
                      changeDescription = `💬 Comentario AÑADIDO`;
                      break;
                    case 'edited':
                      changeDescription = `✏️  Issue EDITADA`;
                      break;
                    default:
                      changeDescription = `${change.event_type.toUpperCase()}`;
                  }
                  
                  reportContent += `${index + 1}. 📌 ISSUE #${change.issue_number}: ${change.issue_title}\n`;
                  reportContent += `   ├─ Cambio: ${changeDescription}\n`;
                  reportContent += `   ├─ Actor: ${change.actor}\n`;
                  reportContent += `   ├─ Fecha: ${change.readable_date}\n`;
                  reportContent += `   └─ Tipo de evento: ${change.event_type}\n\n`;
                  
                  console.log(`${index + 1}. Issue #${change.issue_number} - ${changeDescription} (${change.readable_date})`);
                });
              }
              
              reportContent += '═'.repeat(70) + '\n';
              reportContent += '✅ Reporte generado exitosamente\n';
              
              // Guardar reporte en archivo
              fs.writeFileSync('project-changes.txt', reportContent);
              console.log('\n💾 Reporte guardado: project-changes.txt');
              
              // Guardar JSON con historial
              let allReports = [];
              if (fs.existsSync('project-changes-history.json')) {
                try {
                  allReports = JSON.parse(fs.readFileSync('project-changes-history.json', 'utf8'));
                } catch (e) {
                  console.log('Creando nuevo historial');
                }
              }
              
              allReports.push({
                timestamp: timestamp,
                readable_time: readableTime,
                total_changes: allChanges.length,
                changes: allChanges
              });
              
              fs.writeFileSync('project-changes-history.json', JSON.stringify(allReports, null, 2));
              console.log('💾 Historial guardado: project-changes-history.json');
              
            } catch (error) {
              console.error('❌ Error:', error.message);
              throw error;
            }

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "📊 Track project changes - $(date '+%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push || echo "Nothing to push"
