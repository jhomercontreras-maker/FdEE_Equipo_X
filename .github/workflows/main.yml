name: Monitor Project Date Changes

on:
  schedule:
    - cron: '0 * * * *'  # Cada hora
  workflow_dispatch:

jobs:
  monitor-dates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Monitor Project Dates
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = 'jhomercontreras-maker';
            const repo = 'FdEE_Equipo_X';
            const projectNumber = 2;
            
            const query = `
              query {
                repository(owner: "${owner}", name: "${repo}") {
                  projectV2(number: ${projectNumber}) {
                    title
                    items(first: 100) {
                      nodes {
                        id
                        content {
                          ... on Issue {
                            number
                            title
                            url
                            updatedAt
                          }
                        }
                      }
                    }
                    fields(first: 20) {
                      nodes {
                        ... on ProjectV2Field {
                          id
                          name
                        }
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                        }
                        ... on ProjectV2IterationField {
                          id
                          name
                        }
                      }
                    }
                  }
                }
              }
            `;
            
            try {
              const result = await github.graphql(query);
              const project = result.repository.projectV2;
              const items = project.items.nodes;
              
              console.log('📊 REPORTE DE PROYECTO');
              console.log('='.repeat(60));
              console.log(`Proyecto: ${project.title}`);
              console.log(`Total de items: ${items.length}`);
              console.log(`Fecha de consulta: ${new Date().toISOString()}`);
              console.log('='.repeat(60));
              
              items.forEach((item, index) => {
                if (item.content) {
                  console.log(`\n${index + 1}. 📌 #${item.content.number}: ${item.content.title}`);
                  console.log(`   🔗 ${item.content.url}`);
                  console.log(`   ⏰ Actualizado: ${new Date(item.content.updatedAt).toLocaleString()}`);
                }
              });
              
              console.log('\n' + '='.repeat(60));
              console.log('✅ Monitoreo completado exitosamente');
              
            } catch (error) {
              console.error('❌ Error en la consulta:', error.message);
              throw error;
            }
