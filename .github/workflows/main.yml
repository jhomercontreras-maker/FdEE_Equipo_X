name: Monitor Project Dates Report

on:
  schedule:
    - cron: '0 * * * *'  # Cada hora
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Generate Project Report
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const owner = 'jhomercontreras-maker';
            const repo = 'FdEE_Equipo_X';
            
            const reportFile = 'project-report.txt';
            const jsonFile = 'project-report.json';
            
            try {
              // Obtener todas las issues
              const issues = await github.rest.issues.listForRepo({
                owner: owner,
                repo: repo,
                state: 'all',
                per_page: 100
              });
              
              const timestamp = new Date().toISOString();
              const readableTime = new Date().toLocaleString();
              
              console.log('📊 REPORTE DEL PROYECTO');
              console.log('='.repeat(100));
              console.log(`Proyecto: Sistema de audio amplificador`);
              console.log(`Fecha del reporte: ${readableTime}`);
              console.log(`Total de issues: ${issues.data.length}`);
              console.log('='.repeat(100));
              
              let reportContent = `REPORTE DEL PROYECTO: Sistema de audio amplificador\n`;
              reportContent += `Generado: ${readableTime}\n`;
              reportContent += `${'='.repeat(100)}\n\n`;
              
              const reportData = [];
              
              issues.data.forEach((issue, index) => {
                const issueNumber = issue.number;
                const issueTitle = issue.title;
                const issueState = issue.state;
                const labels = issue.labels.map(l => l.name).join(', ') || 'Sin labels';
                const milestone = issue.milestone?.title || 'Sin milestone';
                const createdDate = new Date(issue.created_at).toLocaleDateString('es-ES', {
                  year: 'numeric',
                  month: 'short',
                  day: 'numeric'
                });
                const updatedDate = new Date(issue.updated_at).toLocaleDateString('es-ES', {
                  year: 'numeric',
                  month: 'short',
                  day: 'numeric'
                });
                
                console.log(`\n${index + 1}. 📌 Sistema de audio amplificador`);
                console.log(`   Issue #${issueNumber}: ${issueTitle}`);
                console.log(`   Estado: ${issueState}`);
                console.log(`   Labels: ${labels}`);
                console.log(`   Milestone: ${milestone}`);
                console.log(`   Start date: ${createdDate}`);
                console.log(`   Last updated: ${updatedDate}`);
                console.log(`   URL: ${issue.html_url}`);
                
                reportContent += `${index + 1}. 📌 Sistema de audio amplificador\n`;
                reportContent += `   Issue #${issueNumber}: ${issueTitle}\n`;
                reportContent += `   Estado: ${issueState}\n`;
                reportContent += `   Labels: ${labels}\n`;
                reportContent += `   Milestone: ${milestone}\n`;
                reportContent += `   Start date: ${createdDate}\n`;
                reportContent += `   Last updated: ${updatedDate}\n`;
                reportContent += `   URL: ${issue.html_url}\n\n`;
                
                reportData.push({
                  project: 'Sistema de audio amplificador',
                  issue_number: issueNumber,
                  issue_title: issueTitle,
                  state: issueState,
                  labels: labels,
                  milestone: milestone,
                  start_date: createdDate,
                  last_updated: updatedDate,
                  url: issue.html_url,
                  recorded_at: timestamp
                });
              });
              
              console.log('='.repeat(100));
              console.log('✅ Reporte generado exitosamente');
              
              // Guardar en archivo de texto
              fs.writeFileSync(reportFile, reportContent);
              console.log(`📝 Guardado en: ${reportFile}`);
              
              // Guardar en JSON con historial
              let allReports = [];
              if (fs.existsSync(jsonFile)) {
                try {
                  allReports = JSON.parse(fs.readFileSync(jsonFile, 'utf8'));
                } catch (e) {
                  allReports = [];
                }
              }
              
              allReports.push({
                timestamp: timestamp,
                readable_time: readableTime,
                project: 'Sistema de audio amplificador',
                total_items: issues.data.length,
                items: reportData
              });
              
              fs.writeFileSync(jsonFile, JSON.stringify(allReports, null, 2));
              console.log(`📊 Historial guardado en: ${jsonFile}`);
              console.log(`📌 Total de reportes guardados: ${allReports.length}`);
              
            } catch (error) {
              console.error('❌ Error:', error.message);
              throw error;
            }
