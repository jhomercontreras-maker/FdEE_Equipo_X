name: Monitor Project Date Changes

on:
  schedule:
    - cron: '0 * * * *'  # Cada hora
  workflow_dispatch:

jobs:
  monitor-dates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Monitor Project Dates
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = 'jhomercontreras-maker';
            const repo = 'FdEE_Equipo_X';
            const projectNumber = 2;
            
            try {
              // Primero, obtener la lista de issues del repositorio
              const issues = await github.rest.issues.listForRepo({
                owner: owner,
                repo: repo,
                state: 'all',
                per_page: 100
              });
              
              console.log('📊 REPORTE DE ISSUES');
              console.log('='.repeat(60));
              console.log(`Repositorio: ${owner}/${repo}`);
              console.log(`Total de issues: ${issues.data.length}`);
              console.log(`Fecha de consulta: ${new Date().toISOString()}`);
              console.log('='.repeat(60));
              
              issues.data.forEach((issue, index) => {
                console.log(`\n${index + 1}. 📌 #${issue.number}: ${issue.title}`);
                console.log(`   Estado: ${issue.state}`);
                console.log(`   Asignado a: ${issue.assignee?.login || 'Sin asignar'}`);
                console.log(`   Creado: ${new Date(issue.created_at).toLocaleString()}`);
                console.log(`   Actualizado: ${new Date(issue.updated_at).toLocaleString()}`);
                if (issue.milestone) {
                  console.log(`   Milestone: ${issue.milestone.title}`);
                }
              });
              
              console.log('\n' + '='.repeat(60));
              console.log('✅ Monitoreo completado exitosamente');
              
              // Guardar en un archivo JSON
              const fs = require('fs');
              const report = {
                timestamp: new Date().toISOString(),
                repository: `${owner}/${repo}`,
                totalIssues: issues.data.length,
                issues: issues.data.map(issue => ({
                  number: issue.number,
                  title: issue.title,
                  state: issue.state,
                  created_at: issue.created_at,
                  updated_at: issue.updated_at,
                  assignee: issue.assignee?.login,
                  milestone: issue.milestone?.title,
                  url: issue.html_url
                }))
              };
              
              console.log('\n📝 Guardando reporte...');
              console.log(JSON.stringify(report, null, 2));
              
            } catch (error) {
              console.error('❌ Error:', error.message);
              throw error;
            }
