name: Track Project Changes

on:
  schedule:
    - cron: '0 * * * *'  # Cada hora
  workflow_dispatch:

jobs:
  track-changes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Track Project Changes
        uses: actions/github-script@v7
        env:
          PROJECT_NUMBER: 2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const owner = 'jhomercontreras-maker';
            const repo = 'FdEE_Equipo_X';
            const projectNumber = parseInt(process.env.PROJECT_NUMBER);
            
            try {
              console.log(`🔍 Buscando Project #${projectNumber}...\n`);
              
              // Obtener información del proyecto con GraphQL
              const projectQuery = `
                query {
                  repository(owner: "${owner}", name: "${repo}") {
                    projectV2(number: ${projectNumber}) {
                      id
                      title
                      items(first: 100) {
                        nodes {
                          id
                          content {
                            ... on Issue {
                              number
                              title
                              state
                            }
                          }
                        }
                      }
                    }
                  }
                }
              `;
              
              const projectData = await github.graphql(projectQuery);
              const project = projectData.repository.projectV2;
              
              console.log(`✅ Proyecto encontrado: ${project.title}`);
              console.log(`📊 Total de items: ${project.items.nodes.length}\n`);
              
              // Obtener todas las issues para el historial de cambios
              const issues = await github.rest.issues.listForRepo({
                owner: owner,
                repo: repo,
                state: 'all',
                per_page: 100
              });
              
              let allChanges = [];
              let itemsData = [];
              
              // Procesar cada issue
              for (const issue of issues.data) {
                console.log(`📌 Procesando issue #${issue.number}...`);
                
                // Obtener eventos
                const events = await github.rest.issues.listEvents({
                  owner: owner,
                  repo: repo,
                  issue_number: issue.number,
                  per_page: 100
                });
                
                // Procesar eventos
                events.data.forEach(event => {
                  allChanges.push({
                    issue_number: issue.number,
                    issue_title: issue.title,
                    event_type: event.event,
                    actor: event.actor?.login || 'Unknown',
                    created_at: event.created_at,
                    readable_date: new Date(event.created_at).toLocaleString('es-ES'),
                    label: event.label?.name || null,
                    milestone: event.milestone?.title || null,
                    assignee: event.assignee?.login || null
                  });
                });
                
                // Guardar información del issue
                itemsData.push({
                  number: issue.number,
                  title: issue.title,
                  state: issue.state,
                  created_at: issue.created_at,
                  updated_at: issue.updated_at,
                  assignee: issue.assignee?.login || 'Sin asignar',
                  milestone: issue.milestone?.title || 'Sin milestone'
                });
              }
              
              // Ordenar cambios por fecha
              allChanges.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
              
              const timestamp = new Date().toISOString();
              const readableTime = new Date().toLocaleString('es-ES');
              
              // Generar reporte
              let reportContent = '';
              reportContent += '╔════════════════════════════════════════════════════════════════════╗\n';
              reportContent += '║           HISTORIAL COMPLETO DEL PROYECTO                         ║\n';
              reportContent += '╚════════════════════════════════════════════════════════════════════╝\n\n';
              reportContent += `📅 Fecha del reporte: ${readableTime}\n`;
              reportContent += `⏰ Timestamp: ${timestamp}\n`;
              reportContent += `🏢 Proyecto: ${project.title}\n`;
              reportContent += `📊 Total de cambios: ${allChanges.length}\n`;
              reportContent += `📌 Total de issues: ${itemsData.length}\n`;
              reportContent += `🔗 Repositorio: ${owner}/${repo}\n\n`;
              
              // SECCIÓN 1: ESTADO ACTUAL DE LOS ISSUES
              reportContent += '═'.repeat(70) + '\n';
              reportContent += '📋 ESTADO ACTUAL DE LOS ISSUES\n';
              reportContent += '═'.repeat(70) + '\n\n';
              
              itemsData.forEach((item, index) => {
                const createdDate = new Date(item.created_at).toLocaleDateString('es-ES');
                const updatedDate = new Date(item.updated_at).toLocaleDateString('es-ES');
                
                reportContent += `${index + 1}. 📌 ISSUE #${item.number}\n`;
                reportContent += `   ├─ Título: ${item.title}\n`;
                reportContent += `   ├─ Estado: ${item.state.toUpperCase()}\n`;
                reportContent += `   ├─ Creada: ${createdDate}\n`;
                reportContent += `   ├─ Actualizada: ${updatedDate}\n`;
                reportContent += `   ├─ Asignado a: ${item.assignee}\n`;
                reportContent += `   ├─ Milestone: ${item.milestone}\n`;
                reportContent += `   ├─ ⏰ Start date: ${createdDate}\n`;
                reportContent += `   └─ 🎯 Target date: ${item.milestone ? 'Según milestone' : 'Sin asignar'}\n\n`;
              });
              
              // SECCIÓN 2: HISTORIAL DE CAMBIOS
              reportContent += '═'.repeat(70) + '\n';
              reportContent += '🔄 HISTORIAL DE CAMBIOS\n';
              reportContent += '═'.repeat(70) + '\n\n';
              
              if (allChanges.length === 0) {
                reportContent += '⚠️ No hay cambios registrados.\n';
              } else {
                allChanges.forEach((change, index) => {
                  let changeDescription = '';
                  
                  switch(change.event_type) {
                    case 'opened':
                      changeDescription = '✅ Issue ABIERTA';
                      break;
                    case 'closed':
                      changeDescription = '❌ Issue CERRADA';
                      break;
                    case 'reopened':
                      changeDescription = '🔄 Issue REABIERTA';
                      break;
                    case 'labeled':
                      changeDescription = `🏷️  Label AÑADIDO: ${change.label}`;
                      break;
                    case 'unlabeled':
                      changeDescription = `🏷️  Label ELIMINADO: ${change.label}`;
                      break;
                    case 'assigned':
                      changeDescription = `👤 ASIGNADO A: ${change.assignee}`;
                      break;
                    case 'unassigned':
                      changeDescription = `👤 DESASIGNADO`;
                      break;
                    case 'milestoned':
                      changeDescription = `🎯 Milestone ASIGNADO: ${change.milestone}`;
                      break;
                    case 'demilestoned':
                      changeDescription = `🎯 Milestone REMOVIDO`;
                      break;
                    case 'commented':
                      changeDescription = `💬 Comentario AÑADIDO`;
                      break;
                    case 'edited':
                      changeDescription = `✏️  Issue EDITADA`;
                      break;
                    default:
                      changeDescription = `${change.event_type.toUpperCase()}`;
                  }
                  
                  reportContent += `${index + 1}. 📌 Issue #${change.issue_number}: ${change.issue_title}\n`;
                  reportContent += `   ├─ Cambio: ${changeDescription}\n`;
                  reportContent += `   ├─ Actor: ${change.actor}\n`;
                  reportContent += `   └─ Fecha: ${change.readable_date}\n\n`;
                });
              }
              
              reportContent += '═'.repeat(70) + '\n';
              reportContent += '✅ Reporte generado exitosamente\n';
              
              // Guardar archivos
              fs.writeFileSync('project-changes.txt', reportContent);
              console.log('\n💾 Guardado: project-changes.txt');
              
              let allReports = [];
              if (fs.existsSync('project-changes-history.json')) {
                try {
                  allReports = JSON.parse(fs.readFileSync('project-changes-history.json', 'utf8'));
                } catch (e) {
                  console.log('Creando nuevo historial');
                }
              }
              
              allReports.push({
                timestamp: timestamp,
                readable_time: readableTime,
                total_changes: allChanges.length,
                total_items: itemsData.length,
                items: itemsData,
                changes: allChanges
              });
              
              fs.writeFileSync('project-changes-history.json', JSON.stringify(allReports, null, 2));
              console.log('💾 Guardado: project-changes-history.json');
              
            } catch (error) {
              console.error('❌ Error:', error.message);
              throw error;
            }

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "📊 Track project changes - $(date '+%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push || echo "Nothing to push"
